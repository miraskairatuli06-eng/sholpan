<!DOCTYPE html>
<html lang="kk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Мұғалім Панелі - BioIntellect</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <nav class="header-nav">
    <a href="index.html" class="logo">BioIntellect</a>
    <div class="nav-links">
      <a href="index.html">Басты бет</a>
      <a href="bot.html">AI Көмекші</a>
    </div>
  </nav>

  <main class="container">
    <div class="glass-panel dashboard-panel animate-fade">
      <div class="row">
        <h2>Оқушылар Нәтижелері</h2>
        <button id="clearBtn" class="btn btn-danger" style="width: auto; padding: 0.5rem 1rem;">Нәтижелерді жою</button>
      </div>
      <p style="text-align: left;">Бұл панельде оқушылардың осы браузерде тапсырған тест нәтижелері көрсетіледі.</p>
      
      <table class="dashboard-table">
        <thead>
          <tr>
            <th>Аты-жөні</th>
            <th>Нұсқа</th>
            <th>Ұпай</th>
            <th>Көрсеткіш</th>
            <th>Күні/Уақыты</th>
          </tr>
        </thead>
        <tbody id="resultsTableBody">
          <!-- Rows dynamically generated -->
        </tbody>
      </table>
      <div id="noResults" style="text-align: center; padding: 2rem; color: var(--text-muted);" class="hidden">
        Қазіргі уақытта ешқандай нәтиже жоқ.
      </div>
    </div>
  </main>

  <script src="data.js"></script>
  <script src="script.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const tbody = document.getElementById('resultsTableBody');
      const noResults = document.getElementById('noResults');
      
      function renderTable() {
        const results = BioIntellect.getResults();
        tbody.innerHTML = '';
        
        if (results.length === 0) {
          noResults.classList.remove('hidden');
          return;
        }
        noResults.classList.add('hidden');
        
        results.slice().reverse().forEach(res => {
          const tr = document.createElement('tr');
          const percent = Math.round((res.score / res.total) * 100);
          let badgeClass = 'badge-danger';
          if(percent >= 85) badgeClass = 'badge-success';
          else if(percent >= 50) badgeClass = 'badge-primary';
            
          const dateStr = new Date(res.date).toLocaleString('kk-KZ');
          
          tr.innerHTML = `
            <td style="font-weight: 600;">${res.name}</td>
            <td><span class="badge ${badgeClass}">${res.variant}</span></td>
            <td><strong>${res.score}</strong> / ${res.total}</td>
            <td>${percent}%</td>
            <td style="font-size: 0.85rem; color: var(--text-muted);">${dateStr}</td>
          `;
          tbody.appendChild(tr);
        });
      }

      document.getElementById('clearBtn').addEventListener('click', () => {
        if(confirm("Барлық нәтижелерді жоюға сенімдісіз бе?")) {
            BioIntellect.clearResults();
            renderTable();
        }
      });

      renderTable();
    });
  </script>
</body>
</html>
